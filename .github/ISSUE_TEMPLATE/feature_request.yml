name: Feature request
description: Propose a focused improvement to design-profile workflows.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Rails or design-system workflow is currently difficult?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior and an example API or command.
    validations:
      required: true
