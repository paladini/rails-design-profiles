name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "3.1"
            gemfile: gemfiles/rails_7_1.gemfile
          - ruby: "3.3"
            gemfile: Gemfile
          - ruby: "4.0"
            gemfile: Gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false
      - run: bundle install
        env:
          BUNDLE_GEMFILE: ${{ matrix.gemfile }}
      - run: bundle exec rake test
        env:
          BUNDLE_GEMFILE: ${{ matrix.gemfile }}
      - run: gem build rails-design-profiles.gemspec
